<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="野帳">
<meta name="application-name" content="野帳">
<meta name="theme-color" content="#F5A800">
<title>水準測量野帳(器高式)</title>
<style>
  :root{
    --cover:#F5A800; --cover-dark:#8A5E00; --ink:#14212E; --paper:#FFFFFF;
    --grid:#C9D2CC; --cut:#D93A2B; --fill:#1D6FE0; --ok:#1E7A46; --faint:#66707E;
    --strip:#14212E;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:#E9E5DA; color:var(--ink); font-size:16px;
    font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif;}
  .mono{font-family:ui-monospace,'SF Mono','Cascadia Mono',Consolas,monospace; font-variant-numeric:tabular-nums;}
  header{background:var(--cover); border-bottom:5px solid var(--cover-dark); padding:16px 14px 14px;}
  .wrap{max-width:760px; margin:0 auto;}
  .eyebrow{font-size:11px; letter-spacing:.35em; color:#5C3D00; font-weight:700;}
  h1{margin:2px 0 10px; font-size:22px; font-weight:800; color:#2E2000;}
  main{max-width:760px; margin:0 auto; padding:14px 10px 120px;}

  /* 現在の器械高:常に画面上部に表示 */
  .ihbar{position:sticky; top:0; z-index:5; background:var(--strip); color:#fff;
    display:flex; align-items:baseline; justify-content:center; gap:10px;
    padding:9px 14px; box-shadow:0 2px 8px rgba(0,0,0,.25);}
  .ihbar .k{font-size:13px; font-weight:700; color:#9FB0C3; letter-spacing:.05em;}
  .ihbar .v{font-size:26px; font-weight:800; color:#FFD35C;}
  .ihbar .u{font-size:13px; color:#9FB0C3;}

  .card{background:var(--paper); border:1px solid var(--grid); border-radius:12px;
    padding:14px; margin-top:14px; box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .card.bm{border-left:8px solid var(--cover); margin-top:14px;}
  .card.tp{border-left:8px solid var(--strip);}
  .card.ip{border-left:8px solid var(--grid);}
  .cardhead{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:8px;}
  .cardhead .left{display:flex; align-items:center; gap:9px; flex:1; min-width:0;}
  .badge{font-size:13px; font-weight:800; padding:4px 12px; border-radius:999px;
    background:#EEF1EC; color:var(--ink); white-space:nowrap;}
  .badge.tp{background:var(--strip); color:#FFD35C;}
  .num{font-size:14px; font-weight:700; color:var(--faint);}
  label.lbl{display:block; font-size:12px; font-weight:800; letter-spacing:.06em;
    color:#4A5462; margin-bottom:4px;}
  input{width:100%; font-size:19px; padding:11px 10px; border:1.5px solid var(--grid);
    border-radius:8px; color:var(--ink); background:#fff; outline:none;
    font-family:ui-monospace,'SF Mono',Consolas,monospace; font-variant-numeric:tabular-nums;}
  input:focus{border-color:var(--cover-dark); background:#FFFDF4;}
  input.jp{font-family:inherit;}
  input.title-in{background:#FFF6DB; border:1.5px solid var(--cover-dark); font-size:15px; font-family:inherit; padding:9px 10px;}
  input.name-in{width:130px; padding:7px 9px; font-size:17px;}
  .g3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px;}
  .reading{border:1.5px dashed var(--grid); border-radius:10px; padding:11px; margin-top:10px; background:#F8FAF6;}
  .reading:first-of-type{margin-top:0;}
  .rgrid{display:grid; grid-template-columns:.8fr 1fr 1fr 30px; gap:8px; align-items:end;}

  /* 計算結果:黒帯に大きく表示 */
  .result{margin-top:10px; background:var(--strip); border-radius:8px;
    padding:9px 12px; display:flex; flex-wrap:wrap; gap:6px 20px; align-items:center;}
  .rkey{font-size:12px; font-weight:800; color:#9FB0C3; letter-spacing:.05em;}
  .rval{font-size:27px; font-weight:800; color:#fff;}
  .rval.sm{font-size:18px; color:#FFD35C;}
  .rcell{display:flex; align-items:baseline; gap:7px;}
  .diffchip{display:inline-block; font-size:20px; font-weight:800; padding:3px 12px; border-radius:8px;}
  .diffchip.blue{background:#173B66; color:#7CC0FF;}
  .diffchip.red{background:#5C1712; color:#FF9A8C;}
  .diffchip.gray{background:#2A3646; color:#8794A4; font-size:16px;}

  .blue{color:var(--fill);} .red{color:var(--cut);} .green{color:var(--ok);} .gray{color:var(--faint);}
  button{cursor:pointer; font-family:inherit;}
  .xbtn{border:none; background:transparent; color:var(--faint); font-size:20px; padding:8px 2px;}
  .delbtn{border:1px solid var(--grid); background:#fff; border-radius:8px;
    color:var(--faint); font-size:13px; font-weight:700; padding:6px 11px;}
  .addread{margin-top:10px; width:100%; padding:11px 0; border-radius:9px; border:1.5px dashed var(--ink);
    background:transparent; color:var(--ink); font-weight:800; font-size:14px;}
  .addbar{display:flex; gap:9px; margin-top:14px;}
  .addbar button{flex:1; padding:15px 0; border-radius:11px; font-weight:800; font-size:15px;}
  .add-ip{border:2px solid var(--ink); background:#fff; color:var(--ink);}
  .add-tp{border:none; background:var(--strip); color:#FFD35C;}
  .copybtn{margin-top:14px; width:100%; padding:15px 0; border-radius:11px; border:2.5px solid var(--cover-dark);
    background:var(--cover); color:#2E2000; font-weight:800; font-size:16px;}
  .resetbtn{margin-top:10px; width:100%; padding:11px 0; border-radius:11px; border:1.5px solid var(--faint);
    background:transparent; color:var(--faint); font-weight:700; font-size:13px;}
  .note{margin-top:12px; font-size:12px; color:var(--faint); line-height:1.8;}
  .ihline{margin-top:12px; background:#FFF6DB; border:1.5px solid var(--cover-dark); border-radius:8px;
    padding:9px 12px; display:flex; align-items:baseline; gap:9px; flex-wrap:wrap;}
  .ihline .rkey{color:#7A5800;}
  .ihline .ihv{font-size:28px; font-weight:800; color:#2E2000;}
  .close-grid{display:grid; grid-template-columns:1fr auto; gap:12px; align-items:end;}
  h2{font-size:16px; font-weight:800; margin:0 0 10px;}
  textarea#fallback{width:100%; height:140px; margin-top:8px; font-size:12px; display:none;
    font-family:ui-monospace,Consolas,monospace;}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:var(--ink); color:#fff;
    padding:12px 20px; border-radius:999px; font-size:15px; font-weight:700; opacity:0; transition:opacity .25s; pointer-events:none; z-index:9;}
  .toast.show{opacity:1;}
  @media (max-width:420px){
    .g3{grid-template-columns:1fr 1fr; }
    .g3 > div:last-child{grid-column:1 / -1;}
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="eyebrow mono">LEVEL BOOK</div>
    <h1>水準測量野帳(器高式)</h1>
    <input id="title" class="title-in" placeholder="工事名・箇所名(例:0271 下層路盤 No.5〜No.12)">
  </div>
</header>

<div class="ihbar">
  <span class="k">現在の器械高 IH</span>
  <span id="currentIH" class="v mono">—</span>
  <span class="u">m</span>
</div>

<main>
  <section class="card bm">
    <h2>基準点(BM)</h2>
    <div class="g3">
      <div><label class="lbl">点名</label><input id="bmName" class="jp"></div>
      <div><label class="lbl">基準高 (m)</label><input id="bmH" inputmode="decimal" placeholder="245.320"></div>
      <div><label class="lbl">後視 BS (m)</label><input id="bmBS" inputmode="decimal" placeholder="1.523"></div>
    </div>
    <div class="ihline">
      <span class="rkey">器械高 IH =</span>
      <span id="firstIH" class="mono ihv">—</span>
      <span class="rkey" style="font-weight:400;">m(基準高+BS)</span>
    </div>
  </section>

  <div id="rows"></div>

  <div class="addbar">
    <button class="add-ip" onclick="addRow('ip')">+ 中間点を追加</button>
    <button class="add-tp" onclick="addRow('tp')">+ もりかえ点を追加</button>
  </div>

  <section class="card">
    <h2>閉合チェック(任意)</h2>
    <div class="close-grid">
      <div><label class="lbl">閉合点の既知高 (m)</label>
        <input id="closeKnown" inputmode="decimal" placeholder="最後の測点の既知標高"></div>
      <div style="padding-bottom:8px;">
        <span class="rkey" style="color:var(--faint);">閉合差 </span>
        <span id="misclose" class="mono" style="font-size:24px;font-weight:800;">—</span>
        <span id="miscloseMm" class="mono" style="font-size:13px;color:var(--faint);"></span>
      </div>
    </div>
  </section>

  <button class="copybtn" id="copyBtn" onclick="copyTable()">結果をコピー(Excel貼り付け用)</button>
  <textarea id="fallback" readonly></textarea>
  <button class="resetbtn" onclick="resetAll()">全部消して新しいページにする</button>

  <p class="note">
    計算式:器械高 IH = 基準高 + 後視BS/地盤高 GH = IH − 前視FS/もりかえ点では 新IH = そのGH + 新BS。
    差は「GH − 設計高」を+/−で表示し、±0.050m以内は青・超えると赤。入力内容はこの端末に自動保存されます。
  </p>
</main>

<div id="toast" class="toast">コピーしました ✓</div>

<script>
"use strict";
const KEY = "levelbook-v1";
let idSeq = 1;

function newReading(label){ return {id:idSeq++, label:label||"", fs:"", design:""}; }
function newRow(type){
  return type === "tp"
    ? {id:idSeq++, type:"tp", name:"", fs:"", bs:"", design:""}
    : {id:idSeq++, type:"ip", name:"", readings:[newReading()]};
}

let state = load() || {
  title:"", bmName:"BM.1", bmH:"", bmBS:"", closeKnown:"", rows:[newRow("ip")]
};

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    let max = 0;
    (s.rows||[]).forEach(r=>{
      max = Math.max(max, r.id||0);
      (r.readings||[]).forEach(m=>{ max = Math.max(max, m.id||0); });
    });
    idSeq = max + 1;
    return s;
  }catch(e){ return null; }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
}

function parseNum(s){
  if(s===""||s===null||s===undefined) return null;
  const n = parseFloat(String(s).replace(/[０-９.]/g, ch => ch==="."?".":String.fromCharCode(ch.charCodeAt(0)-0xFEE0)));
  return isNaN(n) ? null : n;
}
function fmt(v){ return (v===null||v===undefined||isNaN(v)) ? "—" : v.toFixed(3); }

// ---------- 計算 ----------
function compute(){
  const bm = parseNum(state.bmH), bs0 = parseNum(state.bmBS);
  let ih = (bm!==null && bs0!==null) ? bm+bs0 : null;
  const firstIH = ih;
  const rows = state.rows.map(r=>{
    if(r.type==="ip"){
      const readings = r.readings.map(m=>{
        const fs = parseNum(m.fs);
        const gh = (ih!==null && fs!==null) ? ih-fs : null;
        const d = parseNum(m.design);
        const diff = (gh!==null && d!==null) ? gh-d : null;
        return {id:m.id, gh, diff};
      });
      return {id:r.id, type:"ip", ih, readings};
    }
    const fs = parseNum(r.fs);
    const gh = (ih!==null && fs!==null) ? ih-fs : null;
    const d = parseNum(r.design);
    const diff = (gh!==null && d!==null) ? gh-d : null;
    const bs = parseNum(r.bs);
    const rowIH = ih;
    ih = (gh!==null && bs!==null) ? gh+bs : null;
    return {id:r.id, type:"tp", ih:rowIH, gh, diff, ihAfter:ih};
  });
  const currentIH = ih; // 最後のもりかえ後(なければ最初のIH)
  // 閉合
  let lastGH = null;
  for(let i=rows.length-1; i>=0 && lastGH===null; i--){
    const o = rows[i];
    if(o.type==="tp" && o.gh!==null) lastGH = o.gh;
    else if(o.type==="ip"){
      for(let j=o.readings.length-1; j>=0; j--){
        if(o.readings[j].gh!==null){ lastGH = o.readings[j].gh; break; }
      }
    }
  }
  const known = parseNum(state.closeKnown);
  const misclose = (lastGH!==null && known!==null) ? lastGH-known : null;
  return {firstIH, currentIH, rows, misclose};
}

function diffHTML(v){
  if(v===null) return '<span class="diffchip gray">—</span>';
  const within = Math.abs(v) <= 0.05;
  const zero = Math.abs(v) < 0.0005;
  const cls = within ? "blue" : "red";
  const txt = zero ? "±0.000" : (v>0?"+":"−") + fmt(Math.abs(v));
  return '<span class="mono diffchip '+cls+'">'+txt+'</span>';
}

// ---------- 再計算(表示更新のみ・入力は触らない) ----------
function recalc(){
  const c = compute();
  document.getElementById("firstIH").textContent = fmt(c.firstIH);
  document.getElementById("currentIH").textContent = fmt(c.currentIH);
  c.rows.forEach(o=>{
    if(o.type==="ip"){
      o.readings.forEach(m=>{
        const gh = document.querySelector('[data-gh="'+m.id+'"]');
        const df = document.querySelector('[data-diff="'+m.id+'"]');
        if(gh) gh.textContent = fmt(m.gh);
        if(df) df.innerHTML = diffHTML(m.diff);
      });
    }else{
      const gh = document.querySelector('[data-gh="tp'+o.id+'"]');
      const df = document.querySelector('[data-diff="tp'+o.id+'"]');
      const ni = document.querySelector('[data-newih="'+o.id+'"]');
      if(gh) gh.textContent = fmt(o.gh);
      if(df) df.innerHTML = diffHTML(o.diff);
      if(ni) ni.textContent = fmt(o.ihAfter);
    }
  });
  const mEl = document.getElementById("misclose");
  const mmEl = document.getElementById("miscloseMm");
  if(c.misclose===null){ mEl.textContent="—"; mEl.style.color="var(--faint)"; mmEl.textContent=""; }
  else{
    mEl.textContent = (c.misclose>=0?"+":"") + fmt(c.misclose);
    mEl.style.color = Math.abs(c.misclose)<=0.005 ? "var(--ok)" : "var(--cut)";
    mmEl.textContent = " ("+Math.round(c.misclose*1000)+"mm)";
  }
}

// ---------- 行の描画(構造が変わったときだけ) ----------
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }

function buildRows(){
  const box = document.getElementById("rows");
  box.innerHTML = "";
  state.rows.forEach((r,i)=>{
    const sec = document.createElement("section");
    sec.className = "card " + r.type;
    const numTxt = String(i+1).padStart(2,"0");
    if(r.type==="ip"){
      let inner =
        '<div class="cardhead"><div class="left">'+
        '<span class="num mono">'+numTxt+'</span>'+
        '<span class="badge">中間点</span>'+
        '<input class="name-in jp" value="'+esc(r.name)+'" placeholder="No.5" data-f="name" data-row="'+r.id+'">'+
        '</div><button class="delbtn" onclick="removeRow('+r.id+')">削除</button></div>';
      r.readings.forEach((m,j)=>{
        const ph = ["左","中","右"][j] || ("#"+(j+1));
        inner +=
        '<div class="reading">'+
          '<div class="rgrid">'+
            '<div><label class="lbl">位置</label><input class="jp" value="'+esc(m.label)+'" placeholder="'+ph+'" data-f="label" data-row="'+r.id+'" data-read="'+m.id+'"></div>'+
            '<div><label class="lbl">前視 FS (m)</label><input inputmode="decimal" value="'+esc(m.fs)+'" placeholder="0.985" data-f="fs" data-row="'+r.id+'" data-read="'+m.id+'"></div>'+
            '<div><label class="lbl">設計高 (m・任意)</label><input inputmode="decimal" value="'+esc(m.design)+'" placeholder="245.100" data-f="design" data-row="'+r.id+'" data-read="'+m.id+'"></div>'+
            (r.readings.length>1
              ? '<button class="xbtn" onclick="removeReading('+r.id+','+m.id+')">×</button>'
              : '<span></span>')+
          '</div>'+
          '<div class="result">'+
            '<div class="rcell"><span class="rkey">地盤高 GH</span><span class="mono rval" data-gh="'+m.id+'">—</span></div>'+
            '<div class="rcell"><span class="rkey">差</span><span data-diff="'+m.id+'"><span class="diffchip gray">—</span></span></div>'+
          '</div>'+
        '</div>';
      });
      inner += '<button class="addread" onclick="addReading('+r.id+')">+ この測点に測定を追加(左・中・右など)</button>';
      sec.innerHTML = inner;
    }else{
      sec.innerHTML =
        '<div class="cardhead"><div class="left">'+
        '<span class="num mono">'+numTxt+'</span>'+
        '<span class="badge tp">もりかえ点 TP</span>'+
        '<input class="name-in jp" value="'+esc(r.name)+'" placeholder="TP.1" data-f="name" data-row="'+r.id+'">'+
        '</div><button class="delbtn" onclick="removeRow('+r.id+')">削除</button></div>'+
        '<div class="g3">'+
          '<div><label class="lbl">前視 FS (m)</label><input inputmode="decimal" value="'+esc(r.fs)+'" placeholder="0.985" data-f="fs" data-row="'+r.id+'"></div>'+
          '<div><label class="lbl">後視 BS (m)</label><input inputmode="decimal" value="'+esc(r.bs)+'" placeholder="1.402" data-f="bs" data-row="'+r.id+'"></div>'+
          '<div><label class="lbl">設計高 (m・任意)</label><input inputmode="decimal" value="'+esc(r.design)+'" placeholder="245.100" data-f="design" data-row="'+r.id+'"></div>'+
        '</div>'+
        '<div class="result">'+
          '<div class="rcell"><span class="rkey">地盤高 GH</span><span class="mono rval" data-gh="tp'+r.id+'">—</span></div>'+
          '<div class="rcell"><span class="rkey">差</span><span data-diff="tp'+r.id+'"><span class="diffchip gray">—</span></span></div>'+
          '<div class="rcell"><span class="rkey">新IH</span><span class="mono rval sm" data-newih="'+r.id+'">—</span></div>'+
        '</div>';
    }
    box.appendChild(sec);
  });
  recalc();
}

// ---------- 入力ハンドリング(イベント委譲) ----------
document.addEventListener("input", e=>{
  const t = e.target;
  if(!(t instanceof HTMLInputElement)) return;
  if(t.id==="title"){ state.title=t.value; }
  else if(t.id==="bmName"){ state.bmName=t.value; }
  else if(t.id==="bmH"){ state.bmH=t.value; }
  else if(t.id==="bmBS"){ state.bmBS=t.value; }
  else if(t.id==="closeKnown"){ state.closeKnown=t.value; }
  else if(t.dataset.row){
    const row = state.rows.find(r=>r.id==t.dataset.row);
    if(!row) return;
    if(t.dataset.read){
      const m = row.readings.find(x=>x.id==t.dataset.read);
      if(m) m[t.dataset.f] = t.value;
    }else{
      row[t.dataset.f] = t.value;
    }
  }
  save(); recalc();
});

function addRow(type){ state.rows.push(newRow(type)); save(); buildRows(); }
function removeRow(id){ state.rows = state.rows.filter(r=>r.id!==id); save(); buildRows(); }
function addReading(rowId){
  const r = state.rows.find(x=>x.id===rowId);
  if(r){ r.readings.push(newReading()); save(); buildRows(); }
}
function removeReading(rowId, readId){
  const r = state.rows.find(x=>x.id===rowId);
  if(r){ r.readings = r.readings.filter(m=>m.id!==readId); save(); buildRows(); }
}
function resetAll(){
  if(!confirm("入力内容をすべて消去します。よろしいですか?")) return;
  state = {title:"", bmName:"BM.1", bmH:"", bmBS:"", closeKnown:"", rows:[newRow("ip")]};
  save(); initInputs(); buildRows();
}

// ---------- コピー ----------
function buildTSV(){
  const c = compute();
  const L = [];
  if(state.title) L.push(state.title);
  L.push(["測点","位置","後視BS","器械高IH","前視FS","地盤高GH","設計高","差(GH-設計)"].join("\t"));
  L.push([state.bmName||"BM","",state.bmBS,fmt(c.firstIH),"",state.bmH,"",""].join("\t"));
  state.rows.forEach(r=>{
    const cr = c.rows.find(x=>x.id===r.id);
    if(r.type==="ip"){
      r.readings.forEach((m,j)=>{
        const cm = cr.readings.find(x=>x.id===m.id);
        L.push([
          j===0 ? (r.name||"No.") : "",
          m.label, "", "", m.fs, fmt(cm.gh), m.design,
          cm.diff===null ? "" : fmt(cm.diff)
        ].join("\t"));
      });
    }else{
      L.push([
        r.name||"TP", "", r.bs, fmt(cr.ihAfter), r.fs, fmt(cr.gh), r.design,
        cr.diff===null ? "" : fmt(cr.diff)
      ].join("\t"));
    }
  });
  if(c.misclose!==null) L.push(["閉合差","","","","","","",fmt(c.misclose)].join("\t"));
  return L.join("\n");
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1800);
}

function copyTable(){
  const text = buildTSV();
  const done = ()=>toast("コピーしました ✓ Excelにそのまま貼り付けできます");
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text, done));
  }else{
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, done){
  const ta = document.getElementById("fallback");
  ta.style.display = "block";
  ta.value = text;
  ta.focus(); ta.select();
  try{
    if(document.execCommand("copy")){ done(); ta.style.display="none"; return; }
  }catch(e){}
  toast("下の枠を長押しして全選択→コピーしてください");
}

// ---------- 初期化 ----------
function initInputs(){
  document.getElementById("title").value = state.title||"";
  document.getElementById("bmName").value = state.bmName||"";
  document.getElementById("bmH").value = state.bmH||"";
  document.getElementById("bmBS").value = state.bmBS||"";
  document.getElementById("closeKnown").value = state.closeKnown||"";
}
initInputs();
buildRows();

// ---------- オフラインキャッシュ登録(2回目以降は通信なしで即起動) ----------
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}
</script>
